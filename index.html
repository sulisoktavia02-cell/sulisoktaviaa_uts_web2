<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopKu - Belanja Online Mudah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">
  <div id="navbar"></div>

  <!-- Hero Banner -->
  <section class="bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-700 text-white py-16 px-4">
    <div class="max-w-7xl mx-auto text-center">
      <h1 class="text-3xl md:text-5xl font-bold mb-4">Belanja Lebih Mudah<br>di <span class="text-yellow-300">ShopKu</span></h1>
      <p class="text-indigo-200 text-base md:text-lg mb-8 max-w-xl mx-auto">Temukan ribuan produk berkualitas dengan harga terbaik. Belanja nyaman, aman, dan cepat.</p>
      <a href="#products" class="bg-white text-indigo-600 font-semibold px-8 py-3 rounded-full hover:bg-indigo-50 transition-colors inline-block">
        Mulai Belanja
      </a>
    </div>
  </section>

  <!-- Filter & Search -->
  <section class="max-w-7xl mx-auto px-4 py-8" id="products">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm p-4 mb-6">
      <div class="flex flex-col md:flex-row gap-3">
        <div class="flex-1 relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" id="search-input" placeholder="Cari produk..."
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"/>
        </div>
        <select id="category-filter" class="px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          <option value="">Semua Kategori</option>
        </select>
        <select id="sort-filter" class="px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          <option value="">Urutkan</option>
          <option value="price-asc">Harga: Rendah ke Tinggi</option>
          <option value="price-desc">Harga: Tinggi ke Rendah</option>
          <option value="rating">Rating Tertinggi</option>
          <option value="name">Nama A-Z</option>
        </select>
        <div class="flex gap-2 items-center">
          <input type="number" id="min-price" placeholder="Min Harga" min="0"
            class="w-28 px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"/>
          <span class="text-gray-400">-</span>
          <input type="number" id="max-price" placeholder="Max Harga" min="0"
            class="w-28 px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"/>
        </div>
      </div>
    </div>

    <!-- Results info -->
    <div class="flex items-center justify-between mb-4">
      <p id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></p>
      <button id="reset-filter" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline hidden">Reset Filter</button>
    </div>

    <!-- Product Grid -->
    <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      <!-- Loading skeleton -->
      <div class="col-span-full flex justify-center py-16">
        <div class="flex flex-col items-center gap-3">
          <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
          <p class="text-gray-500 dark:text-gray-400 text-sm">Memuat produk...</p>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center gap-2 mt-8"></div>
  </section>

  <!-- Footer -->
  <footer class="bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 mt-12 py-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-indigo-600 dark:text-indigo-400 font-bold text-lg mb-2">ShopKu</p>
      <p class="text-gray-500 dark:text-gray-400 text-sm">© 2024 ShopKu. Belanja online mudah dan aman.</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/products.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    Theme.init();
    renderNavbar('home');

    const ITEMS_PER_PAGE = 10;
    let currentPage = 1;
    let filteredProducts = [];

    async function init() {
      try {
        await Products.load();
        if (Products.getAll().length === 0) {
          document.getElementById('product-grid').innerHTML = `
            <div class="col-span-full text-center py-16">
              <div class="text-6xl mb-4">⚠️</div>
              <p class="text-gray-500 dark:text-gray-400 font-medium">Gagal memuat produk</p>
              <p class="text-gray-400 dark:text-gray-500 text-sm mt-1">Coba refresh halaman</p>
              <button onclick="location.reload()" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-indigo-700">Refresh</button>
            </div>`;
          return;
        }
        populateCategories();
        applyFilters();
        setupEventListeners();
      } catch (e) {
        document.getElementById('product-grid').innerHTML = `
          <div class="col-span-full text-center py-16">
            <div class="text-6xl mb-4">⚠️</div>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Terjadi kesalahan</p>
            <button onclick="location.reload()" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-indigo-700">Refresh</button>
          </div>`;
      }
    }

    function populateCategories() {
      const select = document.getElementById('category-filter');
      Products.getCategories().forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function applyFilters() {
      const search = document.getElementById('search-input').value;
      const category = document.getElementById('category-filter').value;
      const sort = document.getElementById('sort-filter').value;
      const minPrice = parseFloat(document.getElementById('min-price').value) || 0;
      const maxPrice = parseFloat(document.getElementById('max-price').value) || Infinity;

      filteredProducts = Products.filter({ search, category, minPrice, maxPrice, sort });
      currentPage = 1;
      renderProducts();

      const hasFilter = search || category || sort || document.getElementById('min-price').value || document.getElementById('max-price').value;
      document.getElementById('reset-filter').classList.toggle('hidden', !hasFilter);
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const count = document.getElementById('results-count');

      count.textContent = `Menampilkan ${filteredProducts.length} produk`;

      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-16">
            <div class="text-6xl mb-4">🔍</div>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Produk tidak ditemukan</p>
            <p class="text-gray-400 dark:text-gray-500 text-sm mt-1">Coba kata kunci atau filter lain</p>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const paginated = filteredProducts.slice(start, start + ITEMS_PER_PAGE);
      grid.innerHTML = paginated.map(p => Products.renderCard(p)).join('');
      renderPagination();
      attachCardEvents();
    }

    function renderPagination() {
      const total = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE);
      const container = document.getElementById('pagination');
      if (total <= 1) { container.innerHTML = ''; return; }

      let html = '';
      for (let i = 1; i <= total; i++) {
        html += `<button class="pagination-btn w-9 h-9 rounded-xl text-sm font-medium transition-colors ${i === currentPage ? 'bg-indigo-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700'}" data-page="${i}">${i}</button>`;
      }
      container.innerHTML = html;

      container.querySelectorAll('.pagination-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          currentPage = parseInt(this.dataset.page);
          renderProducts();
          document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
        });
      });
    }

    function attachCardEvents() {
      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', function (e) {
          if (e.target.closest('.add-to-cart-btn') || e.target.closest('.wishlist-btn')) return;
          window.location.href = 'pages/product.html?id=' + this.dataset.id;
        });
      });

      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (!Auth.isLoggedIn()) {
            Toast.show('Silakan login terlebih dahulu', 'warning');
            setTimeout(() => window.location.href = 'pages/login.html', 1200);
            return;
          }
          const product = Products.getById(this.dataset.id);
          if (product) Cart.addItem(product);
        });
      });

      document.querySelectorAll('.wishlist-btn').forEach(btn => {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (!Auth.isLoggedIn()) {
            Toast.show('Silakan login terlebih dahulu', 'warning');
            return;
          }
          const id = parseInt(this.dataset.id);
          const wishlist = Storage.getWishlist();
          const idx = wishlist.findIndex(w => w.id === id);
          const product = Products.getById(id);
          if (idx >= 0) {
            wishlist.splice(idx, 1);
            Storage.saveWishlist(wishlist);
            Toast.show('Dihapus dari wishlist', 'info');
          } else {
            wishlist.push(product);
            Storage.saveWishlist(wishlist);
            Toast.show('Ditambahkan ke wishlist!', 'success');
          }
          const svg = this.querySelector('svg');
          const inWishlist = Storage.getWishlist().some(w => w.id === id);
          svg.setAttribute('fill', inWishlist ? 'currentColor' : 'none');
          svg.classList.toggle('text-red-500', inWishlist);
          svg.classList.toggle('fill-red-500', inWishlist);
          svg.classList.toggle('text-gray-400', !inWishlist);
        });
      });
    }

    function setupEventListeners() {
      let debounceTimer;
      document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 300);
      });
      document.getElementById('category-filter').addEventListener('change', applyFilters);
      document.getElementById('sort-filter').addEventListener('change', applyFilters);
      document.getElementById('min-price').addEventListener('input', applyFilters);
      document.getElementById('max-price').addEventListener('input', applyFilters);
      document.getElementById('reset-filter').addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        document.getElementById('category-filter').value = '';
        document.getElementById('sort-filter').value = '';
        document.getElementById('min-price').value = '';
        document.getElementById('max-price').value = '';
        applyFilters();
      });
    }

    init();
  </script>
</body>
</html>
