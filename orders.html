<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riwayat Pesanan - ShopKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">
  <div id="navbar"></div>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Riwayat Pesanan
    </h1>

    <div id="orders-list"></div>
  </div>

  <!-- Order Detail Modal -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b border-gray-100 dark:border-gray-700">
        <h2 class="font-bold text-gray-800 dark:text-white text-lg">Detail Pesanan</h2>
        <button id="close-modal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="modal-content" class="p-6"></div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    Theme.init();
    if (!Auth.requireAuth()) {}
    renderNavbar('orders');

    const currentUser = Auth.getCurrentUser();

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('id-ID', {
        day: 'numeric', month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function getStatusColor(status) {
      const map = {
        'Diproses': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400',
        'Dikirim': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
        'Selesai': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
        'Dibatalkan': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
      };
      return map[status] || 'bg-gray-100 text-gray-700';
    }

    function renderOrders() {
      const allOrders = Storage.getOrders();
      const orders = allOrders.filter(o => o.userId === currentUser.id);
      const container = document.getElementById('orders-list');

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="text-center py-20">
            <div class="text-7xl mb-4">📦</div>
            <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">Belum Ada Pesanan</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Anda belum pernah melakukan pembelian</p>
            <a href="../index.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors inline-block">
              Mulai Belanja
            </a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm mb-4 overflow-hidden">
          <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-700">
            <div>
              <p class="text-xs text-gray-500 dark:text-gray-400">ID Transaksi</p>
              <p class="font-bold text-indigo-600 dark:text-indigo-400 text-sm">${order.id}</p>
            </div>
            <span class="text-xs font-semibold px-3 py-1 rounded-full ${getStatusColor(order.status)}">${order.status}</span>
          </div>
          <div class="p-4">
            <div class="flex gap-3 mb-3 overflow-x-auto pb-1">
              ${order.items.slice(0, 4).map(item => `
                <img src="${item.image}" alt="${item.name}" class="w-14 h-14 object-cover rounded-xl flex-shrink-0" onerror="this.src='https://via.placeholder.com/56x56?text=?'"/>
              `).join('')}
              ${order.items.length > 4 ? `<div class="w-14 h-14 bg-gray-100 dark:bg-gray-700 rounded-xl flex items-center justify-center text-sm font-bold text-gray-500 dark:text-gray-400 flex-shrink-0">+${order.items.length - 4}</div>` : ''}
            </div>
            <p class="text-sm text-gray-600 dark:text-gray-400 mb-1">${order.items.length} produk · ${order.payment}</p>
            <p class="text-xs text-gray-400 dark:text-gray-500 mb-3">${formatDate(order.createdAt)}</p>
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-gray-500 dark:text-gray-400">Total Pembayaran</p>
                <p class="font-bold text-gray-800 dark:text-white">${Products.formatPrice(order.total)}</p>
              </div>
              <button class="detail-btn text-sm text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-700 px-4 py-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors font-medium" data-id="${order.id}">
                Lihat Detail
              </button>
            </div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          showOrderDetail(this.dataset.id);
        });
      });
    }

    function showOrderDetail(orderId) {
      const order = Storage.getOrders().find(o => o.id === orderId);
      if (!order) return;

      document.getElementById('modal-content').innerHTML = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-3">
              <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">ID Transaksi</p>
              <p class="font-bold text-indigo-600 dark:text-indigo-400 text-xs">${order.id}</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-3">
              <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Status</p>
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${getStatusColor(order.status)}">${order.status}</span>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-3">
              <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Tanggal</p>
              <p class="font-medium text-gray-800 dark:text-white text-xs">${formatDate(order.createdAt)}</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-3">
              <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Pembayaran</p>
              <p class="font-medium text-gray-800 dark:text-white text-xs">${order.payment}</p>
            </div>
          </div>

          <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-3 text-sm">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Alamat Pengiriman</p>
            <p class="font-medium text-gray-800 dark:text-white text-xs">${order.recipient.name}</p>
            <p class="text-gray-600 dark:text-gray-300 text-xs">${order.recipient.phone}</p>
            <p class="text-gray-600 dark:text-gray-300 text-xs">${order.recipient.address}</p>
          </div>

          ${order.notes ? `<div class="bg-yellow-50 dark:bg-yellow-900/20 rounded-xl p-3"><p class="text-xs text-yellow-700 dark:text-yellow-400">📝 ${order.notes}</p></div>` : ''}

          <div>
            <p class="font-semibold text-gray-800 dark:text-white text-sm mb-3">Produk Dipesan</p>
            <div class="space-y-3">
              ${order.items.map(item => `
                <div class="flex gap-3 items-center">
                  <img src="${item.image}" alt="${item.name}" class="w-12 h-12 object-cover rounded-xl flex-shrink-0" onerror="this.src='https://via.placeholder.com/48x48?text=?'"/>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-800 dark:text-white truncate">${item.name}</p>
                    <p class="text-xs text-gray-500 dark:text-gray-400">${Products.formatPrice(item.price)} × ${item.quantity}</p>
                  </div>
                  <p class="text-sm font-bold text-gray-800 dark:text-white">${Products.formatPrice(item.price * item.quantity)}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="border-t border-gray-100 dark:border-gray-700 pt-3 space-y-2 text-sm">
            <div class="flex justify-between text-gray-600 dark:text-gray-400">
              <span>Subtotal</span><span>${Products.formatPrice(order.subtotal)}</span>
            </div>
            <div class="flex justify-between text-gray-600 dark:text-gray-400">
              <span>Ongkos Kirim</span>
              <span class="${order.shipping === 0 ? 'text-green-600 font-medium' : ''}">${order.shipping === 0 ? 'GRATIS' : Products.formatPrice(order.shipping)}</span>
            </div>
            <div class="flex justify-between font-bold text-gray-800 dark:text-white pt-2 border-t border-gray-100 dark:border-gray-700">
              <span>Total</span>
              <span class="text-indigo-600 dark:text-indigo-400">${Products.formatPrice(order.total)}</span>
            </div>
          </div>
        </div>
      `;

      document.getElementById('order-modal').classList.remove('hidden');
    }

    document.getElementById('close-modal').addEventListener('click', () => {
      document.getElementById('order-modal').classList.add('hidden');
    });

    document.getElementById('order-modal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.add('hidden');
    });

    renderOrders();
  </script>
</body>
</html>
