<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang - ShopKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">
  <div id="navbar"></div>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
      </svg>
      Keranjang Belanja
    </h1>

    <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Loading -->
      <div class="col-span-full flex justify-center py-16">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    Theme.init();
    if (!Auth.requireAuth()) {}
    renderNavbar('cart');

    function renderCart() {
      const items = Cart.getItems();
      const container = document.getElementById('cart-content');

      if (items.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-center py-20">
            <div class="text-7xl mb-4">🛒</div>
            <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">Keranjang Kosong</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Belum ada produk di keranjang Anda</p>
            <a href="../index.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors inline-block">
              Mulai Belanja
            </a>
          </div>`;
        return;
      }

      const itemsHTML = items.map(item => `
        <div class="flex gap-4 p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm cart-item" data-id="${item.id}">
          <img src="${item.image}" alt="${item.name}" class="w-20 h-20 object-cover rounded-xl flex-shrink-0" onerror="this.src='https://via.placeholder.com/80x80?text=No+Image'"/>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-gray-800 dark:text-white text-sm mb-1 truncate">${item.name}</h3>
            <span class="text-xs text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-2 py-0.5 rounded-full">${item.category}</span>
            <p class="text-indigo-600 dark:text-indigo-400 font-bold mt-2 text-sm">${Products.formatPrice(item.price)}</p>
          </div>
          <div class="flex flex-col items-end justify-between">
            <button class="remove-btn text-gray-400 hover:text-red-500 transition-colors" data-id="${item.id}">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
            <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
              <button class="qty-minus px-2 py-1 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-bold text-sm transition-colors" data-id="${item.id}">−</button>
              <span class="qty-display w-8 text-center text-sm font-medium text-gray-800 dark:text-white">${item.quantity}</span>
              <button class="qty-plus px-2 py-1 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-bold text-sm transition-colors" data-id="${item.id}">+</button>
            </div>
            <p class="text-sm font-bold text-gray-800 dark:text-white">${Products.formatPrice(item.price * item.quantity)}</p>
          </div>
        </div>
      `).join('');

      const total = Cart.getTotal();
      const shipping = total >= 200000 ? 0 : 15000;
      const grandTotal = total + shipping;

      container.innerHTML = `
        <div class="lg:col-span-2 space-y-3">
          <div class="flex items-center justify-between mb-2">
            <p class="text-sm text-gray-500 dark:text-gray-400">${items.length} produk</p>
            <button id="clear-cart" class="text-sm text-red-500 hover:underline">Hapus Semua</button>
          </div>
          ${itemsHTML}
        </div>

        <div class="lg:col-span-1">
          <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 sticky top-20">
            <h2 class="font-bold text-gray-800 dark:text-white text-lg mb-4">Ringkasan Pesanan</h2>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between text-gray-600 dark:text-gray-400">
                <span>Subtotal (${Cart.getTotalItems()} item)</span>
                <span>${Products.formatPrice(total)}</span>
              </div>
              <div class="flex justify-between text-gray-600 dark:text-gray-400">
                <span>Ongkos Kirim</span>
                <span class="${shipping === 0 ? 'text-green-600 font-medium' : ''}">${shipping === 0 ? 'GRATIS' : Products.formatPrice(shipping)}</span>
              </div>
              ${shipping > 0 ? `<p class="text-xs text-gray-400 dark:text-gray-500">Gratis ongkir untuk pembelian ≥ Rp200.000</p>` : ''}
              <div class="border-t border-gray-100 dark:border-gray-700 pt-3 flex justify-between font-bold text-gray-800 dark:text-white">
                <span>Total</span>
                <span class="text-indigo-600 dark:text-indigo-400">${Products.formatPrice(grandTotal)}</span>
              </div>
            </div>
            <a href="checkout.html" class="mt-5 block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl text-center transition-colors">
              Lanjut ke Checkout
            </a>
            <a href="../index.html" class="mt-3 block w-full text-center text-sm text-indigo-600 dark:text-indigo-400 hover:underline">
              Lanjut Belanja
            </a>
          </div>
        </div>
      `;

      attachEvents();
    }

    function attachEvents() {
      document.getElementById('clear-cart')?.addEventListener('click', () => {
        if (confirm('Hapus semua item dari keranjang?')) {
          Cart.clear();
          Toast.show('Keranjang dikosongkan', 'info');
          renderCart();
        }
      });

      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          Cart.removeItem(parseInt(this.dataset.id));
          Toast.show('Produk dihapus dari keranjang', 'info');
          renderCart();
        });
      });

      document.querySelectorAll('.qty-minus').forEach(btn => {
        btn.addEventListener('click', function () {
          const id = parseInt(this.dataset.id);
          const item = Cart.getItems().find(i => i.id === id);
          if (item) {
            Cart.updateQuantity(id, item.quantity - 1);
            renderCart();
          }
        });
      });

      document.querySelectorAll('.qty-plus').forEach(btn => {
        btn.addEventListener('click', function () {
          const id = parseInt(this.dataset.id);
          const item = Cart.getItems().find(i => i.id === id);
          if (item) {
            Cart.updateQuantity(id, item.quantity + 1);
            renderCart();
          }
        });
      });
    }

    renderCart();
  </script>
</body>
</html>
