<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Produk - ShopKu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">
  <div id="navbar"></div>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-6">
      <a href="../index.html" class="hover:text-indigo-600 dark:hover:text-indigo-400">Beranda</a>
      <span>/</span>
      <span id="breadcrumb-name" class="text-gray-800 dark:text-white">Detail Produk</span>
    </nav>

    <div id="product-detail" class="flex justify-center py-16">
      <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Related Products -->
    <div id="related-section" class="hidden mt-12">
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4">Produk Serupa</h2>
      <div id="related-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </div>
  </div>

  <footer class="bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 mt-12 py-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-indigo-600 dark:text-indigo-400 font-bold text-lg mb-2">ShopKu</p>
      <p class="text-gray-500 dark:text-gray-400 text-sm">© 2024 ShopKu. Belanja online mudah dan aman.</p>
    </div>
  </footer>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    Theme.init();
    renderNavbar();

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    async function init() {
      await Products.load();
      const product = Products.getById(productId);
      if (!product) {
        document.getElementById('product-detail').innerHTML = `
          <div class="text-center py-16">
            <div class="text-6xl mb-4">😕</div>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Produk tidak ditemukan</p>
            <a href="../index.html" class="mt-4 inline-block text-indigo-600 hover:underline">Kembali ke Beranda</a>
          </div>`;
        return;
      }

      document.title = product.name + ' - ShopKu';
      document.getElementById('breadcrumb-name').textContent = product.name;

      const inWishlist = Storage.getWishlist().some(w => w.id === product.id);

      document.getElementById('product-detail').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
          <div class="space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-md">
              <img src="${product.image}" alt="${product.name}" class="w-full h-80 md:h-96 object-cover" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'"/>
            </div>
          </div>
          <div class="space-y-5">
            <div>
              <span class="inline-block bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400 text-xs font-semibold px-3 py-1 rounded-full mb-3">${product.category}</span>
              <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white">${product.name}</h1>
              <div class="flex items-center gap-2 mt-2">
                <div class="flex text-base">${Products.renderStars(product.rating)}</div>
                <span class="text-sm text-gray-500 dark:text-gray-400">${product.rating} / 5.0</span>
              </div>
            </div>

            <div class="text-3xl font-bold text-indigo-600 dark:text-indigo-400">${Products.formatPrice(product.price)}</div>

            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-4">
              <h3 class="font-semibold text-gray-800 dark:text-white mb-2 text-sm">Deskripsi Produk</h3>
              <p class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed">${product.description}</p>
            </div>

            <div class="flex items-center gap-3 text-sm">
              <span class="text-gray-500 dark:text-gray-400">Stok:</span>
              <span class="font-semibold ${product.stock > 10 ? 'text-green-600' : 'text-orange-500'}">${product.stock > 0 ? product.stock + ' tersedia' : 'Habis'}</span>
            </div>

            <div class="flex items-center gap-3">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Jumlah:</label>
              <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
                <button id="qty-minus" class="px-3 py-2 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold transition-colors">−</button>
                <input type="number" id="qty-input" value="1" min="1" max="${product.stock}"
                  class="w-14 text-center py-2 bg-white dark:bg-gray-900 text-gray-800 dark:text-white text-sm border-x border-gray-200 dark:border-gray-700 focus:outline-none"/>
                <button id="qty-plus" class="px-3 py-2 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold transition-colors">+</button>
              </div>
            </div>

            <div class="flex gap-3 pt-2">
              <button id="add-to-cart" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                Tambah ke Keranjang
              </button>
              <button id="wishlist-btn" class="p-3 border-2 ${inWishlist ? 'border-red-500 text-red-500' : 'border-gray-200 dark:border-gray-700 text-gray-400 dark:text-gray-500'} rounded-xl hover:border-red-500 hover:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" stroke="currentColor" fill="${inWishlist ? 'currentColor' : 'none'}">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
              </button>
            </div>

            <a href="cart.html" class="block w-full text-center border-2 border-indigo-600 text-indigo-600 dark:text-indigo-400 dark:border-indigo-400 font-semibold py-3 rounded-xl hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors">
              Lihat Keranjang
            </a>
          </div>
        </div>
      `;

      // Quantity controls
      const qtyInput = document.getElementById('qty-input');
      document.getElementById('qty-minus').addEventListener('click', () => {
        if (parseInt(qtyInput.value) > 1) qtyInput.value = parseInt(qtyInput.value) - 1;
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        if (parseInt(qtyInput.value) < product.stock) qtyInput.value = parseInt(qtyInput.value) + 1;
      });

      document.getElementById('add-to-cart').addEventListener('click', () => {
        if (!Auth.isLoggedIn()) {
          Toast.show('Silakan login terlebih dahulu', 'warning');
          setTimeout(() => window.location.href = 'login.html', 1200);
          return;
        }
        Cart.addItem(product, parseInt(qtyInput.value));
      });

      document.getElementById('wishlist-btn').addEventListener('click', () => {
        if (!Auth.isLoggedIn()) {
          Toast.show('Silakan login terlebih dahulu', 'warning');
          return;
        }
        const wishlist = Storage.getWishlist();
        const idx = wishlist.findIndex(w => w.id === product.id);
        const btn = document.getElementById('wishlist-btn');
        const svg = btn.querySelector('svg');
        if (idx >= 0) {
          wishlist.splice(idx, 1);
          Storage.saveWishlist(wishlist);
          Toast.show('Dihapus dari wishlist', 'info');
          btn.classList.remove('border-red-500', 'text-red-500');
          btn.classList.add('border-gray-200', 'dark:border-gray-700', 'text-gray-400');
          svg.setAttribute('fill', 'none');
        } else {
          wishlist.push(product);
          Storage.saveWishlist(wishlist);
          Toast.show('Ditambahkan ke wishlist!', 'success');
          btn.classList.add('border-red-500', 'text-red-500');
          btn.classList.remove('border-gray-200', 'text-gray-400');
          svg.setAttribute('fill', 'currentColor');
        }
      });

      // Related products
      const related = Products.filter({ category: product.category }).filter(p => p.id !== product.id).slice(0, 4);
      if (related.length > 0) {
        document.getElementById('related-section').classList.remove('hidden');
        document.getElementById('related-grid').innerHTML = related.map(p => Products.renderCard(p, '../')).join('');

        document.querySelectorAll('#related-grid .product-card').forEach(card => {
          card.addEventListener('click', function (e) {
            if (e.target.closest('.add-to-cart-btn') || e.target.closest('.wishlist-btn')) return;
            window.location.href = 'product.html?id=' + this.dataset.id;
          });
        });
        document.querySelectorAll('#related-grid .add-to-cart-btn').forEach(btn => {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            if (!Auth.isLoggedIn()) { Toast.show('Silakan login terlebih dahulu', 'warning'); return; }
            const p = Products.getById(this.dataset.id);
            if (p) Cart.addItem(p);
          });
        });
      }
    }

    init();
  </script>
</body>
</html>
